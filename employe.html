<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>AET — Espace Employé</title>
<link rel="manifest" href="manifest-employe.json"/>
<meta name="theme-color" content="#10b981"/>
<link rel="icon" href="icon-192.png" type="image/png"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="AET Employé"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
:root{--cm-bg:#f8fafc;--cm-card:#ffffff;--cm-text:#0f172a;--cm-muted:#64748b;--cm-primary:#10b981;--cm-primary-2:#059669;--cm-danger:#ef4444;--cm-warning:#f59e0b;--cm-info:#2563eb;--cm-border:rgba(15,23,42,.08);--cm-radius:18px;--cm-shadow:0 10px 32px rgba(15,23,42,.06);--orange:#ff6a00;--orange2:#ff8f1f}
*{box-sizing:border-box}body{margin:0;font-family:Poppins,system-ui,sans-serif;background:var(--cm-bg);color:var(--cm-text)}button,input,select,textarea{font:inherit;cursor:pointer}
/* Shell */
.cm-shell{min-height:100vh;display:grid;grid-template-columns:260px 1fr;grid-template-rows:auto 1fr}
.cm-topbar{grid-column:1/-1;background:#0f172a;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.cm-topbar h1{margin:0;font-size:17px;font-weight:700}
.cm-sidebar{background:#0f172a;color:#fff;padding:20px 16px;display:flex;flex-direction:column;gap:6px;min-height:calc(100vh - 54px)}
.cm-sidebar a{color:rgba(255,255,255,.7);text-decoration:none;padding:10px 14px;border-radius:12px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:10px;transition:.15s}
.cm-sidebar a:hover,.cm-sidebar a.active{background:rgba(255,255,255,.1);color:#fff}
.cm-sidebar a.active{background:var(--cm-primary)}
.cm-main{padding:20px;overflow:auto}
/* Cards */
.cm-card{background:var(--cm-card);border-radius:var(--cm-radius);box-shadow:var(--cm-shadow);border:1px solid var(--cm-border)}
.cm-section{padding:18px}
/* Grille */
.cm-grid{display:grid;gap:16px}
.cm-grid.cols-2{grid-template-columns:repeat(2,1fr)}
.cm-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.cm-grid.cols-4{grid-template-columns:repeat(4,1fr)}
/* Formulaires */
.cm-btn{border:none;border-radius:14px;padding:12px 16px;font-weight:700;cursor:pointer;background:#e2e8f0;color:#0f172a;transition:.15s}
.cm-btn.primary{background:linear-gradient(135deg,var(--cm-primary),var(--cm-primary-2));color:#fff}
.cm-btn.danger{background:var(--cm-danger);color:#fff}
.cm-btn.small{padding:8px 10px;border-radius:10px;font-size:12px}
.cm-btn:disabled{opacity:.4;cursor:not-allowed}
.cm-input,.cm-select,.cm-textarea{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--cm-border);background:#fff;margin-bottom:10px}
.cm-inline-form{display:grid;gap:10px}
/* Produits */
.cm-product-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:12px}
.cm-product-tile{background:#fff;border:1px solid var(--cm-border);border-radius:16px;padding:14px;text-align:left;cursor:pointer;transition:.15s}
.cm-product-tile:hover{border-color:var(--cm-primary);transform:translateY(-2px)}
.cm-product-tile strong{display:block;font-size:14px}
.cm-product-tile span{display:block;font-size:13px;color:var(--cm-primary);font-weight:700;margin-top:4px}
.cm-product-tile small{display:block;font-size:11px;color:var(--cm-muted);margin-top:2px}
/* Panier */
.cm-list{display:grid;gap:8px;padding:0;margin:0;list-style:none}
.cm-cart-row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:10px;background:#f8fafc;border-radius:14px}
.cm-qty-actions{display:flex;align-items:center;gap:8px}
.cm-qty-btn{width:30px;height:30px;border:none;border-radius:999px;background:#e2e8f0;cursor:pointer;font-weight:700}
.cm-total-row{display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--cm-border);font-weight:800;font-size:16px}
/* Table */
.cm-table{width:100%;border-collapse:collapse}
.cm-table th,.cm-table td{padding:12px;border-bottom:1px solid var(--cm-border);text-align:left;font-size:14px}
.cm-table th{font-size:12px;color:var(--cm-muted);text-transform:uppercase}
/* Badge */
.cm-badge{display:inline-flex;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700}
.cm-badge.success{background:rgba(16,185,129,.1);color:#047857}
.cm-badge.warning{background:rgba(245,158,11,.12);color:#b45309}
.cm-badge.danger{background:rgba(239,68,68,.1);color:#b91c1c}
/* KPI */
.cm-kpi{display:grid;gap:6px;padding:16px;border-radius:16px;background:#f8fafc;border:1px solid var(--cm-border)}
.cm-kpi span{font-size:12px;color:var(--cm-muted);text-transform:uppercase}
.cm-kpi strong{font-size:24px;font-weight:800}
/* Toast */
.cm-toast{position:fixed;right:20px;bottom:80px;background:#0f172a;color:#fff;padding:12px 16px;border-radius:14px;z-index:1000;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* Ticket */
.cm-receipt-list{display:grid;gap:8px;margin-bottom:14px}
.cm-receipt-item{display:flex;justify-content:space-between;gap:12px;border:1px solid var(--cm-border);border-radius:14px;padding:12px;background:#fff;cursor:pointer}
.cm-receipt-item.active{border-color:var(--cm-primary);box-shadow:0 0 0 2px rgba(16,185,129,.12)}
/* Mobile */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--cm-border);display:grid;grid-template-columns:repeat(6,1fr);z-index:200}
@media(max-width:900px){
  .cm-shell{grid-template-columns:1fr}
  .cm-sidebar{display:none}
  .mobile-nav{display:grid;grid-template-columns:repeat(5,1fr);padding:8px 4px calc(8px + env(safe-area-inset-bottom))}
  .mobile-nav button{border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#374151;padding:6px}
  .mobile-nav button.active{color:var(--cm-primary)}
  .cm-main{padding:14px 12px 80px}
  .cm-grid.cols-2,.cm-grid.cols-3,.cm-grid.cols-4{grid-template-columns:1fr}
}
.empty-state{text-align:center;padding:32px;color:var(--cm-muted)}
.empty-state i{font-size:32px;margin-bottom:12px;display:block}
</style>
</head>
<body>
<div class="cm-shell">
  <div class="cm-topbar">
    <h1><i class="fas fa-cash-register" style="color:var(--cm-primary)"></i> &nbsp;AET Commerce — Espace Employé</h1>
    <div style="display:flex;gap:10px;align-items:center">
      <span id="topbarUser" style="font-size:13px;opacity:.7"></span>
      <button class="cm-btn small" onclick="doSignOut()" style="background:rgba(255,255,255,.1);color:#fff">Déconnexion</button>
    </div>
  </div>
  <aside class="cm-sidebar">
    <a href="#login" onclick="navigate('login')" id="nav-login"><i class="fas fa-user-circle"></i> Connexion</a>
    <a href="#pos"   onclick="navigate('pos')"   id="nav-pos"  ><i class="fas fa-cash-register"></i> Caisse (POS)</a>
    <a href="#stock" onclick="navigate('stock')" id="nav-stock"><i class="fas fa-boxes-stacked"></i> Stock</a>
    <a href="#orders" onclick="navigate('orders')" id="nav-orders"><i class="fas fa-clipboard-list"></i> Commandes</a>
    <a href="#chat" onclick="navigate('chat')" id="nav-chat" style="position:relative"><i class="fas fa-comments"></i> Messages <span id="chatBadgeSide" style="display:none;background:#ef4444;color:#fff;border-radius:999px;font-size:10px;padding:1px 6px;margin-left:4px"></span></a>
    <a href="#receipts" onclick="navigate('receipts')" id="nav-receipts"><i class="fas fa-receipt"></i> Tickets</a>
    <div style="flex:1"></div>
    <div id="sidebarContext" style="font-size:12px;opacity:.5;padding:8px 14px"></div>
  </aside>
  <main class="cm-main" id="cmMain">
    <div class="empty-state"><i class="fas fa-spinner fa-spin"></i>Chargement…</div>
  </main>
</div>

<!-- Navigation mobile -->
<nav class="mobile-nav">
  <button onclick="navigate('login')"    id="mnav-login"   ><i class="fas fa-user-circle"></i><span>Connexion</span></button>
  <button onclick="navigate('pos')"      id="mnav-pos"     ><i class="fas fa-cash-register"></i><span>Caisse</span></button>
  <button onclick="navigate('stock')"    id="mnav-stock"   ><i class="fas fa-boxes-stacked"></i><span>Stock</span></button>
  <button onclick="navigate('orders')"   id="mnav-orders"  ><i class="fas fa-clipboard-list"></i><span>Commandes</span></button>
  <button onclick="navigate('chat')"     id="mnav-chat"    style="position:relative"><i class="fas fa-comments"></i><span>Messages</span><span id="chatBadge" style="display:none;position:absolute;top:6px;right:18px;background:#ef4444;color:#fff;border-radius:999px;font-size:10px;padding:1px 5px;font-weight:800"></span></button>
  <button onclick="navigate('receipts')" id="mnav-receipts"><i class="fas fa-receipt"></i><span>Tickets</span></button>
</nav>

<script type="module">
import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import {
  getFirestore, doc, collection, getDocs, onSnapshot, runTransaction, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ── Firebase ─────────────────────────────────────────────────────────────────
const FIREBASE_CONFIG = window.__AET_FIREBASE_CONFIG__ || {
  apiKey: 'AIzaSyB5hpkRlFZ9HFRRbpQlvpHwMNDja37Nr2s',
  authDomain: 'gestion-salaire-9d3e9.firebaseapp.com',
  projectId: 'gestion-salaire-9d3e9',
  storageBucket: 'gestion-salaire-9d3e9.firebasestorage.app',
  messagingSenderId: '1090226725870',
  appId: '1:1090226725870:web:d16c25eb46397b3f2de4ff',
};
const app  = getApps().length ? getApp() : initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── Paramètres ───────────────────────────────────────────────────────────────
const qs       = new URLSearchParams(location.search);
const tenantId = qs.get('tenant') || qs.get('uid') || '';
const storeId  = qs.get('store')  || qs.get('shop') || '';

// ── État ─────────────────────────────────────────────────────────────────────
// Source de vérité unique : commerce_data/{tenantId} (même document que lit/écrit
// l'admin dans index.html). cmData garde la forme brute {shops,articles,mouvements,
// pendingOrders}; les autres champs d'état (products, inventory, …) en sont dérivés
// pour ne pas casser le reste du rendu de cette page.
let cmData = { shops: [], articles: [], mouvements: [], pendingOrders: [], cashSessions: [] };
let cmUnsub = null;

let state = {
  user: null, context: null,
  products: [], inventory: [], orders: [], sales: [], cashSessions: [],
  cart: [], selectedSaleId: '',
};
let currentPage = 'login';

// ── Utilitaires ───────────────────────────────────────────────────────────────
const money = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'XOF',maximumFractionDigits:0}).format(Number(n||0));
const esc   = v => String(v==null?'':v).replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[s]||s);
const html  = (id, c) => { const el=document.getElementById(id); if(el) el.innerHTML=c; };
const setMain = c => html('cmMain', c);
const empUID = () => 'emp_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);

function showToast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'cm-toast';
  el.style.background = type==='error' ? '#ef4444' : type==='success' ? '#10b981' : '#0f172a';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}
window.showToast = showToast;

function setNav(page) {
  document.querySelectorAll('.cm-sidebar a, .mobile-nav button').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-'+page) || document.getElementById('mnav-'+page);
  if (el) el.classList.add('active');
  // Mobile aussi
  const mel = document.getElementById('mnav-'+page);
  if (mel) mel.classList.add('active');
}

window.navigate = function(page) {
  currentPage = page;
  setNav(page);
  renderPage();
};

// ── Référence document commerce_data ────────────────────────────────────────
const cdRef = () => doc(db, 'commerce_data', tenantId || state.user?.uid || 'default');

// Reconstruit state.products / inventory / orders / sales / cashSessions à
// partir du document brut commerce_data, filtré sur la boutique courante.
function deriveStateFromCmData() {
  const sid = storeId || state.context?.storeIds?.[0] || '';
  const arts = Array.isArray(cmData.articles) ? cmData.articles : [];
  const artsForShop = sid ? arts.filter(a => String(a.shopId) === String(sid)) : arts;

  state.products = artsForShop.map(a => ({
    id: a.id,
    name: a.name || a.nom || 'Article',
    salePrice: Number(a.prixV ?? a.prixVente ?? a.prix ?? 0),
    promoPrice: null,
    stock: Number(a.stock || 0),
  }));

  state.inventory = artsForShop.map(a => ({
    productId: a.id,
    storeId: a.shopId,
    availableQuantity: Number(a.stock || 0),
    reorderLevel: Number(a.seuil ?? 5),
  }));

  const pending = Array.isArray(cmData.pendingOrders) ? cmData.pendingOrders : [];
  state.orders = pending
    .filter(o => !sid || String(o.shopId) === String(sid) || !o.shopId)
    .map(o => ({ ...o }));

  const mvts = Array.isArray(cmData.mouvements) ? cmData.mouvements : [];
  state.sales = mvts
    .filter(m => m.type === 'sale' && (!sid || String(m.shopId) === String(sid)))
    .sort((a,b) => (b.createdAtMs||0) - (a.createdAtMs||0))
    .slice(0, 50)
    .map(m => ({
      id: m.id,
      receiptNumber: m.receiptNumber || m.id,
      paymentMethod: m.paymentMethod || 'cash',
      sellerName: m.sellerName || '',
      items: m.items || [],
      grandTotal: m.total || m.grandTotal || 0,
    }));

  state.cashSessions = (Array.isArray(cmData.cashSessions) ? cmData.cashSessions : [])
    .filter(s => !sid || String(s.storeId) === String(sid));

  if (!state.selectedSaleId && state.sales[0]) state.selectedSaleId = state.sales[0].id;
}

// ── Chargement données (abonnement temps réel) ──────────────────────────────
function loadData() {
  return new Promise((resolve) => {
    const tid = tenantId || state.user?.uid || '';
    if (!tid) { resolve(); return; }
    if (cmUnsub) cmUnsub();
    let first = true;
    cmUnsub = onSnapshot(cdRef(), snap => {
      cmData = snap.exists() ? (snap.data() || {}) : {};
      cmData.articles      = Array.isArray(cmData.articles) ? cmData.articles : [];
      cmData.shops         = Array.isArray(cmData.shops) ? cmData.shops : [];
      cmData.mouvements    = Array.isArray(cmData.mouvements) ? cmData.mouvements : [];
      cmData.pendingOrders = Array.isArray(cmData.pendingOrders) ? cmData.pendingOrders : [];
      cmData.cashSessions  = Array.isArray(cmData.cashSessions) ? cmData.cashSessions : [];
      deriveStateFromCmData();
      if (first) { first = false; resolve(); }
      else if (state.user) renderPage(); // rafraîchir l'écran courant en temps réel
    }, err => {
      console.error('[Employé]', err);
      resolve();
    });
  });
}

function activeSession() {
  const sid = storeId || state.context?.storeIds?.[0] || '';
  return state.cashSessions.find(s => s.status === 'open' && (!sid || s.storeId === sid)) || null;
}

// ── Pages ────────────────────────────────────────────────────────────────────
function renderPage() {
  if (!state.user) { renderLogin(); return; }
  switch(currentPage) {
    case 'pos':      renderPOS();      break;
    case 'stock':    renderStock();    break;
    case 'orders':   renderOrders();   break;
    case 'chat':     renderChat();     break;
    case 'receipts': renderReceipts(); break;
    default:         renderLoginInfo();
  }
}

// Page connexion
function renderLogin() {
  setMain(`<div class="cm-card cm-section" style="max-width:420px;margin:40px auto">
    <h2><i class="fas fa-lock" style="color:var(--cm-primary)"></i> Connexion Employé</h2>
    <p style="color:var(--cm-muted);font-size:13px">Connectez-vous avec votre compte Firebase autorisé.</p>
    <div id="loginErr" style="color:var(--cm-danger);font-size:13px;margin-bottom:8px"></div>
    <input class="cm-input" id="loginEmail"    type="email"    placeholder="Email"/>
    <input class="cm-input" id="loginPassword" type="password" placeholder="Mot de passe"/>
    <button class="cm-btn primary" style="width:100%" onclick="doSignIn()"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
  </div>`);
}

function renderLoginInfo() {
  setMain(`<div class="cm-card cm-section" style="max-width:420px;margin:40px auto">
    <h2><i class="fas fa-user-check" style="color:var(--cm-primary)"></i> Connecté</h2>
    <p>${esc(state.user?.email||'')}</p>
    <p style="color:var(--cm-muted);font-size:13px">Rôle: <strong>${esc(state.context?.role||'client')}</strong></p>
    <button class="cm-btn primary" onclick="navigate('pos')">Aller à la caisse →</button>
  </div>`);
}

// Page POS
function renderPOS() {
  const session = activeSession();
  const sid     = storeId || state.context?.storeIds?.[0] || '';
  const total   = state.cart.reduce((s,i) => s + Number(i.qty||0)*Number(i.unitPrice||0), 0);

  const sessionCard = session
    ? `<div class="cm-card cm-section">
        <h3><i class="fas fa-cash-register" style="color:var(--cm-primary)"></i> Caisse ouverte</h3>
        <p style="color:var(--cm-muted);font-size:13px">Session: <strong>${esc(session.id.slice(-6))}</strong> · Fond: <strong>${esc(money(session.openingAmount||0))}</strong></p>
        <div class="cm-inline-form" style="margin-top:10px">
          <input class="cm-input" id="closingAmount" type="number" placeholder="Montant de clôture (XOF)"/>
          <button class="cm-btn danger" onclick="doCloseSession('${esc(session.id)}')">Clôturer la caisse</button>
        </div>
      </div>`
    : `<div class="cm-card cm-section">
        <h3><i class="fas fa-door-open" style="color:var(--cm-warning)"></i> Ouvrir une caisse</h3>
        <div class="cm-inline-form" style="margin-top:10px">
          <input class="cm-input" id="openingAmount" type="number" placeholder="Fond de caisse (XOF)"/>
          <button class="cm-btn primary" onclick="doOpenSession()">Ouvrir la caisse</button>
        </div>
      </div>`;

  const cartRows = state.cart.length
    ? state.cart.map(item =>
        `<li class="cm-cart-row">
          <div><strong>${esc(item.name)}</strong><div style="font-size:12px;color:var(--cm-muted)">${esc(money(item.unitPrice))} × ${esc(String(item.qty))}</div></div>
          <div class="cm-qty-actions">
            <button class="cm-qty-btn" data-cart-action="dec" data-pid="${esc(String(item.productId))}">−</button>
            <span>${esc(String(item.qty))}</span>
            <button class="cm-qty-btn" data-cart-action="inc" data-pid="${esc(String(item.productId))}">+</button>
          </div>
          <strong>${esc(money(item.qty*item.unitPrice))}</strong>
        </li>`).join('')
    : '<li style="color:var(--cm-muted);padding:10px 0">Aucun article dans le panier</li>';

  const productsMarkup = state.products.length
    ? state.products.map(p =>
        `<button class="cm-product-tile" data-add-pid="${esc(String(p.id))}">
          <strong>${esc(p.name||'Article')}</strong>
          <span>${esc(money(p.promoPrice??p.salePrice??0))}</span>
          <small>Stock: ${esc(String(p.stock??p.quantity??'?'))}</small>
        </button>`).join('')
    : '<div class="empty-state"><i class="fas fa-box-open"></i>Aucun produit dans ce magasin.</div>';

  setMain(`
    <div class="cm-grid cols-2">
      ${sessionCard}
      <div class="cm-card cm-section">
        <h3><i class="fas fa-shopping-cart" style="color:var(--cm-primary)"></i> Panier (${state.cart.length})</h3>
        <ul class="cm-list">${cartRows}</ul>
        <div class="cm-total-row"><span>Total</span><span>${esc(money(total))}</span></div>
        <div style="display:flex;gap:10px;margin-top:14px">
          <select class="cm-select" id="payMethod" style="margin:0;flex:1">
            <option value="cash">💵 Cash</option>
            <option value="mobile_money">📱 Mobile Money</option>
            <option value="card">💳 Carte</option>
          </select>
          <button class="cm-btn primary" id="saleBtn" ${state.cart.length && session ? '' : 'disabled'} onclick="doSale()">
            <i class="fas fa-check"></i> Encaisser
          </button>
        </div>
        ${!session ? '<p style="color:var(--cm-warning);font-size:12px;margin-top:8px"><i class="fas fa-exclamation-triangle"></i> Ouvrez une caisse pour encaisser</p>' : ''}
        <button class="cm-btn small danger" style="margin-top:8px;width:100%" onclick="state.cart=[];renderPage()">Vider le panier</button>
      </div>
    </div>
    <div class="cm-card cm-section" style="margin-top:16px">
      <h3><i class="fas fa-th-large" style="color:var(--cm-primary)"></i> Catalogue caisse</h3>
      <div class="cm-product-grid" id="productGrid">${productsMarkup}</div>
    </div>
  `);

  // Events produits

// Page commandes — avec filtres En attente / Validée / Rejetée
let ordersFilter = 'pending';

function renderOrders() {
  const allPending = Array.isArray(cmData.pendingOrders) ? cmData.pendingOrders : [];
  const sid = storeId || state.context?.storeIds?.[0] || '';

  // Récupérer TOUTES les commandes (pending + completed + rejected)
  const all = allPending.filter(o => !sid || String(o.shopId) === String(sid) || !o.shopId);

  const filterLabel = { pending: 'En attente', completed: 'Validées', rejected: 'Rejetées' };
  const filterBtns = Object.entries(filterLabel).map(([k,v]) => {
    const count = all.filter(o => (o.status||'pending') === k).length;
    return `<button onclick="setOrdersFilter('${k}')" style="padding:8px 14px;border-radius:12px;font-weight:700;font-size:13px;cursor:pointer;border:2px solid ${ordersFilter===k?'var(--cm-primary)':'var(--cm-border)'};background:${ordersFilter===k?'var(--cm-primary)':'#fff'};color:${ordersFilter===k?'#fff':'var(--cm-text)'}">${v} <span style="background:rgba(255,255,255,.25);border-radius:999px;padding:1px 6px">${count}</span></button>`;
  }).join('');

  const filtered = all.filter(o => (o.status||'pending') === ordersFilter);

  let content = '';
  if (!filtered.length) {
    content = `<div class="empty-state"><i class="fas fa-clipboard-list"></i><br>Aucune commande "${filterLabel[ordersFilter].toLowerCase()}".</div>`;
  } else {
    const statusColor = { pending:'warning', completed:'success', rejected:'danger' };
    const statusTxt   = { pending:'En attente', completed:'Validée', rejected:'Rejetée' };
    const rows = filtered.map(order => {
      const st = order.status || 'pending';
      const actions = st === 'pending' ? `
        <button class="cm-btn primary small" data-approve-oid="${esc(order.id)}" style="margin-right:6px"><i class="fas fa-check"></i> Valider</button>
        <button class="cm-btn danger small"  data-reject-oid="${esc(order.id)}"><i class="fas fa-times"></i> Rejeter</button>
      ` : `<span class="cm-badge ${statusColor[st]||'warning'}">${statusTxt[st]||st}</span>`;
      const itemsPreview = (order.items||[]).slice(0,2).map(i=>`${i.name} ×${i.qty}`).join(' • ') + (order.items?.length>2?` +${order.items.length-2}`:'');
      return `<tr>
        <td><strong>${esc((order.id||'').slice(-8))}</strong><br><small style="color:var(--cm-muted)">${esc(new Date(order.createdAtMs||Date.now()).toLocaleDateString('fr'))}</small></td>
        <td>${esc(order.customer?.name||'Client')}<br><small style="color:var(--cm-muted)">${esc(order.customer?.phone||'—')}</small></td>
        <td style="font-size:12px;color:var(--cm-muted)">${esc(itemsPreview)}</td>
        <td><strong>${esc(money(order.grandTotal||order.total||0))}</strong></td>
        <td>${actions}</td>
      </tr>`;
    }).join('');
    content = `<div class="cm-card cm-section">
      <table class="cm-table"><thead><tr><th>Réf / Date</th><th>Client</th><th>Articles</th><th>Total</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  }

  setMain(`<div class="cm-card cm-section" style="margin-bottom:14px">
    <h2 style="margin:0 0 14px"><i class="fas fa-clipboard-list" style="color:var(--cm-primary)"></i> Commandes</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap">${filterBtns}</div>
  </div>
  ${content}`);

  document.querySelectorAll('[data-approve-oid]').forEach(btn => {
    btn.onclick = () => doApproveOrder(btn.dataset.approveOid);
  });
  document.querySelectorAll('[data-reject-oid]').forEach(btn => {
    btn.onclick = () => doRejectOrder(btn.dataset.rejectOid);
  });
}

// ── Actions ──────────────────────────────────────────────────────────────────
function addToCart(pid) {
  const p = state.products.find(x => String(x.id) === String(pid));
  if (!p) return;
  const existing = state.cart.find(x => x.productId === p.id);
  if (existing) existing.qty += 1;
  else state.cart.push({ productId: p.id, name: p.name||'Article', qty: 1, unitPrice: Number(p.promoPrice??p.salePrice??0) });
}

function updateCartQty(pid, delta) {
  const row = state.cart.find(x => x.productId === pid);
  if (!row) return;
  row.qty = Number(row.qty||0) + delta;
  if (row.qty <= 0) state.cart = state.cart.filter(x => x.productId !== pid);
}

window.doOpenSession = async function() {
  const amount = Number(document.getElementById('openingAmount')?.value || 0);
  const sid    = storeId || state.context?.storeIds?.[0] || '';
  try {
    await runTransaction(db, async (tx) => {
      const ref = cdRef();
      const snap = await tx.get(ref);
      const data = snap.exists() ? (snap.data() || {}) : {};
      const sessions = Array.isArray(data.cashSessions) ? data.cashSessions : [];
      sessions.push({
        id: empUID(), storeId: sid, status: 'open', openingAmount: amount,
        employeeId: state.user?.uid, employeeName: state.user?.displayName||state.user?.email||'Opérateur',

      });
      tx.set(ref, { cashSessions: sessions, updatedAt: serverTimestamp() }, { merge: true });
    });
    showToast('Caisse ouverte ✅', 'success');
  } catch(e) { showToast(e.message||'Erreur', 'error'); }
};

window.doCloseSession = async function(sessionId) {
  const closing = Number(document.getElementById('closingAmount')?.value || 0);
  try {
    await runTransaction(db, async (tx) => {
      const ref = cdRef();
      const snap = await tx.get(ref);
      const data = snap.exists() ? (snap.data() || {}) : {};
      const sessions = Array.isArray(data.cashSessions) ? data.cashSessions : [];
      const idx = sessions.findIndex(s => s.id === sessionId);
      if (idx >= 0) sessions[idx] = { ...sessions[idx], status: 'closed', closingAmount: closing, closedAtMs: Date.now() };
      tx.set(ref, { cashSessions: sessions, updatedAt: serverTimestamp() }, { merge: true });
    });
    showToast('Caisse clôturée', 'success');
  } catch(e) { showToast(e.message||'Erreur', 'error'); }
};

window.doSale = async function() {
  const session = activeSession();
  if (!session) { showToast('Ouvrez une caisse d\'abord', 'error'); return; }
  if (!state.cart.length) { showToast('Panier vide', 'error'); return; }
  const paymentMethod = document.getElementById('payMethod')?.value || 'cash';
  const sid           = storeId || state.context?.storeIds?.[0] || '';
  const grandTotal    = state.cart.reduce((s,i) => s + i.qty*i.unitPrice, 0);
  const receiptNum    = 'AET-' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '-' + String(Date.now()).slice(-4);
  const saleItems     = state.cart.map(i => ({ ...i, total: i.qty*i.unitPrice }));

  try {
    // Transaction atomique sur commerce_data : décrémente le stock des articles
    // ET enregistre la vente comme mouvement, en une seule écriture cohérente.
    await runTransaction(db, async (tx) => {
      const ref = cdRef();
      const snap = await tx.get(ref);
      const data = snap.exists() ? (snap.data() || {}) : {};
      const articles   = Array.isArray(data.articles) ? data.articles : [];
      const mouvements = Array.isArray(data.mouvements) ? data.mouvements : [];

      for (const item of state.cart) {
        const idx = articles.findIndex(a => String(a.id) === String(item.productId));
        if (idx >= 0) {
          const current = Number(articles[idx].stock || 0);
          if (current < item.qty) {
            throw new Error(`Stock insuffisant pour "${item.name}" (disponible: ${current})`);
          }
          articles[idx] = { ...articles[idx], stock: current - item.qty };
        }
      }

      mouvements.push({
        id: empUID(), type: 'sale', shopId: sid,
        cashSessionId: session.id,
        sellerEmployeeId: state.user?.uid,
        sellerName: state.user?.displayName || state.user?.email || 'Opérateur',
        source: 'employee-pos', paymentMethod,
        items: saleItems, total: grandTotal, grandTotal,
        receiptNumber: receiptNum, status: 'completed',
        createdAtMs: Date.now(),
      });

      tx.set(ref, { articles, mouvements, updatedAt: serverTimestamp() }, { merge: true });
    });
    state.cart = [];
    showToast('Vente enregistrée ✅ · ' + receiptNum, 'success');
    state.selectedSaleId = receiptNum;
    navigate('receipts');
  } catch(e) { showToast(e.message||'Erreur vente', 'error'); }
};

window.doRejectOrder = async function(orderId) {
  if (!confirm('Rejeter cette commande ?')) return;
  try {
    await runTransaction(db, async (tx) => {
      const ref = cdRef();
      const snap = await tx.get(ref);
      const data = snap.exists() ? (snap.data() || {}) : {};
      const pending = Array.isArray(data.pendingOrders) ? data.pendingOrders : [];
      const oIdx = pending.findIndex(o => o.id === orderId);
      if (oIdx >= 0) pending[oIdx] = { ...pending[oIdx], status: 'rejected', rejectedAt: Date.now(), rejectedBy: state.user?.email || 'employé' };
      tx.set(ref, { pendingOrders: pending, updatedAt: serverTimestamp() }, { merge: true });
    });
    showToast('Commande rejetée', 'success');
    renderOrders();
  } catch(e) { showToast(e.message||'Erreur', 'error'); }
};

let chatThreadsUnsub = null;
let activeThreadId = null;
let activeThreadUnsub = null;

function chatThreadsRef() {

function renderChat() {
  setMain(`<div class="cm-card cm-section">

function loadChatThreads() {
  if (chatThreadsUnsub) { chatThreadsUnsub(); chatThreadsUnsub = null; }
  const tid = tenantId || state.user?.uid || '';
  if (!tid) { document.getElementById('chatThreadsContent').innerHTML = '<p style="padding:10px;font-size:13px;color:var(--cm-muted)">ID boutique manquant.</p>'; return; }

  chatThreadsUnsub = onSnapshot(chatThreadsRef(), snap => {
    const threads = [];
    snap.forEach(d => threads.push({ id: d.id, ...d.data() }));
    threads.sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));

    const unread = threads.filter(t => t.unreadEmployee).length;
    const badge = document.getElementById('chatBadge');
    if (badge) { badge.textContent = unread||''; badge.style.display = unread ? 'inline' : 'none'; }
    const badgeSide = document.getElementById('chatBadgeSide');
    if (badgeSide) { badgeSide.textContent = unread||''; badgeSide.style.display = unread ? 'inline' : 'none'; }

    const container = document.getElementById('chatThreadsContent');
    if (!container) return;
    if (!threads.length) {
      container.innerHTML = '<p style="padding:10px;font-size:13px;color:var(--cm-muted)">Aucune conversation.</p>';
      return;
    }
    container.innerHTML = threads.map(t => {
      const lastMsg = (t.messages||[]).slice(-1)[0];
      const preview = lastMsg ? lastMsg.text.slice(0,35) + (lastMsg.text.length>35?'…':'') : '';
      const isActive = t.id === activeThreadId;
      return `<button onclick="openThread('${esc(t.id)}')" style="width:100%;text-align:left;border:none;border-radius:10px;padding:10px;cursor:pointer;background:${isActive?'var(--cm-primary)':'transparent'};color:${isActive?'#fff':'var(--cm-text)'};transition:.15s">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <strong style="font-size:13px">${esc(t.clientName||'Client')}</strong>
          ${t.unreadEmployee&&!isActive?'<span style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block"></span>':''}
        </div>
        <div style="font-size:11px;opacity:.7;margin-top:2px">${esc(t.clientPhone||'')} · ${esc(t.chatType||'support')}</div>
        <div style="font-size:12px;opacity:.6;margin-top:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(preview)}</div>
      </button>`;
    }).join('');
  }, err => console.warn('[chatThreads]', err));
}

window.openThread = function(threadId) {
  activeThreadId = threadId;
  if (activeThreadUnsub) { activeThreadUnsub(); activeThreadUnsub = null; }
  loadChatThreads(); // re-render list to show active

  const tid = tenantId || state.user?.uid || 'default';
  const ref = doc(db, 'chats', tid, 'threads', threadId);

  const area = document.getElementById('chatMsgsArea');
  const replyArea = document.getElementById('chatReplyArea');
  if (replyArea) replyArea.style.display = 'flex';

  // Marquer comme lu
  import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js').then(({ updateDoc }) => {
    updateDoc(ref, { unreadEmployee: false }).catch(()=>{});
  });

  activeThreadUnsub = onSnapshot(ref, snap => {
    if (!area) return;
    if (!snap.exists()) { area.innerHTML = '<p style="padding:10px;color:var(--cm-muted)">Aucun message.</p>'; return; }
    const data = snap.data();
    const messages = Array.isArray(data.messages) ? data.messages : [];
    area.innerHTML = messages.map(m => {
      const isClient = m.role === 'client';
      const t = m.ts ? new Date(m.ts).toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'}) : '';
      const bgColor = isClient ? '#f1f5f9' : 'var(--cm-primary)';
      const txtColor = isClient ? 'var(--cm-text)' : '#fff';
      const align = isClient ? 'flex-start' : 'flex-end';
      return `<div style="display:flex;justify-content:${align}">
        <div style="max-width:75%;background:${bgColor};color:${txtColor};border-radius:14px;padding:10px 14px;font-size:13px">
          <div style="font-size:10px;opacity:.6;margin-bottom:3px">${isClient?esc(m.sender||'Client'):'Employé'} · ${t}</div>
          ${esc(m.text)}
        </div>
      </div>`;
    }).join('');
    area.scrollTop = area.scrollHeight;
  }, err => console.warn('[activeThread]', err));
};

window.sendEmployeeReply = async function() {

window.doApproveOrder = async function(orderId) {
  const order = state.orders.find(o => o.id === orderId);
  if (!order) return;
  const sid = storeId || state.context?.storeIds?.[0] || '';
  const receiptNum = 'AET-' + Date.now();
  try {
    await runTransaction(db, async (tx) => {
      const ref = cdRef();
      const snap = await tx.get(ref);
      const data = snap.exists() ? (snap.data() || {}) : {};
      const articles   = Array.isArray(data.articles) ? data.articles : [];
      const mouvements = Array.isArray(data.mouvements) ? data.mouvements : [];
      const pending     = Array.isArray(data.pendingOrders) ? data.pendingOrders : [];

      for (const item of (order.items || [])) {
        const pid = item.articleId || item.productId;
        const idx = articles.findIndex(a => String(a.id) === String(pid));
        if (idx >= 0) {
          const current = Number(articles[idx].stock || 0);
          articles[idx] = { ...articles[idx], stock: Math.max(0, current - Number(item.qty||0)) };
        }
      }

      mouvements.push({
        id: empUID(), type: 'sale', shopId: order.shopId || sid,
        originOrderId: orderId,
        sellerEmployeeId: state.user?.uid,
        sellerName: state.user?.displayName || state.user?.email || 'Opérateur',
        source: 'storefront-approved', paymentMethod: 'cash',
        items: order.items || [], total: order.grandTotal||order.total||0, grandTotal: order.grandTotal||order.total||0,
        receiptNumber: receiptNum, status: 'completed',
        createdAtMs: Date.now(),
      });

      const oIdx = pending.findIndex(o => o.id === orderId);
      if (oIdx >= 0) pending[oIdx] = { ...pending[oIdx], status: 'completed' };

      tx.set(ref, { articles, mouvements, pendingOrders: pending, updatedAt: serverTimestamp() }, { merge: true });
    });
    showToast('Commande validée ✅', 'success');
    navigate('receipts');
  } catch(e) { showToast(e.message||'Erreur', 'error'); }
};

window.doPrint = function() {
  const sale = state.sales.find(s => s.id === state.selectedSaleId) || state.sales[0];
  if (!sale) return;
  const items = (sale.items||[]).map(i =>
    `<tr><td>${i.name||'Article'}</td><td>${i.qty}</td><td>${money(i.unitPrice)}</td><td>${money(i.total||(i.qty*i.unitPrice))}</td></tr>`
  ).join('');
  const win = window.open('','_blank','noopener,width=600,height=700');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Ticket</title>
  <style>body{font-family:Arial,sans-serif;padding:20px;max-width:400px;margin:0 auto}
  table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #eee;text-align:left}
  .total{font-weight:bold;font-size:16px;margin-top:16px}hr{border:none;border-top:1px dashed #ccc}
  </style></head><body>
  <h2>🧾 ${sale.receiptNumber||sale.id.slice(-6)}</h2>
  <p>Paiement: ${sale.paymentMethod||'cash'} · Vendeur: ${sale.sellerName||'—'}</p><hr>
  <table><thead><tr><th>Article</th><th>Qté</th><th>PU</th><th>Total</th></tr></thead><tbody>${items}</tbody></table>
  <div class="total">Total: ${money(sale.grandTotal||0)}</div>
  <p style="color:#888;font-size:12px;margin-top:20px">AET Commerce — Merci de votre achat</p>
  </body></html>`);
  win.document.close();
  setTimeout(() => { win.focus(); win.print(); }, 200);
};

// ── Auth ─────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  state.user = user;
  const topbar = document.getElementById('topbarUser');
  const sidebar = document.getElementById('sidebarContext');
  if (!user) {
    if (topbar) topbar.textContent = '';
    currentPage = 'login';
    navigate('login');
    return;
  }
  if (topbar) topbar.textContent = user.email || user.displayName || '';

  // Charger le rôle/permissions depuis Firestore (fonctionnalité indépendante du stock,
  // toujours basée sur tenants/{tid}/roleBindings — non liée à commerce_data)
  const tid = tenantId || user.uid;
  try {
    const { getDoc: gd } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
    const roleDoc = await gd(doc(db,'tenants',tid,'roleBindings',user.uid));
    if (roleDoc.exists()) {
      const rb = roleDoc.data();
      state.context = {
        tenantId: tid, authUser: user,
        role: rb.role || 'employee',
        storeIds: rb.storeIds || [],
        employeeId: rb.employeeId || user.uid,
        can: (res, act) => true, // simplifié
      };
      if (sidebar) sidebar.textContent = rb.role || 'employee';
    } else {
      state.context = { tenantId: tid, authUser: user, role: 'employee', storeIds: [], employeeId: user.uid, can: () => true };
    }
  } catch(e) {
    state.context = { tenantId: tid, authUser: user, role: 'employee', storeIds: [], employeeId: user.uid, can: () => true };
  }

  await loadData();
  // Démarrer le listener de chat (badge de messages non lus)
  setTimeout(() => { try { loadChatThreads(); } catch(e) {} }, 500);
  currentPage = 'pos';
  navigate('pos');
});
</script>
