const fmt = (n) => new Intl.NumberFormat("fr-TG").format(n || 0);

function DonutChart({ data, total, size = 120 }) {
  const r = 40, cx = 60, cy = 60;
  const circumference = 2 * Math.PI * r;
  let offset = 0;
  const slices = data.map((d) => {
    const pct = d.value / total;
    const dash = pct * circumference;
    const slice = { ...d, dash, offset, pct };
    offset += dash;
    return slice;
  });
  return (
    <svg width={size} height={size} viewBox="0 0 120 120">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#E5E7EB" strokeWidth="18" />
      {slices.map((s, i) => (
        <circle key={i} cx={cx} cy={cy} r={r} fill="none"
          stroke={s.color} strokeWidth="18"
          strokeDasharray={`${s.dash} ${circumference - s.dash}`}
          strokeDashoffset={-s.offset}
          style={{ transform: "rotate(-90deg)", transformOrigin: "60px 60px" }}
        />
      ))}
      <text x={cx} y={cy - 6} textAnchor="middle" fontSize="11" fontWeight="700" fill={COLORS.text}>
        {fmt(total)}
      </text>
      <text x={cx} y={cy + 9} textAnchor="middle" fontSize="8" fill={COLORS.muted}>FCFA</text>
    </svg>
  );
}

function ProgressBar({ pct, color }) {
  return (
    <div style={{ background: "#E5E7EB", borderRadius: 99, height: 7, overflow: "hidden" }}>
      <div style={{ width: `${Math.min(pct, 100)}%`, background: color, height: "100%", borderRadius: 99, transition: "width .5s" }} />

  );
}

// ─── VERROUILLAGE PIN ───
function LockScreen({ onUnlock }) {
  const [code, setCode] = useState([]);
  const CORRECT = [1, 2, 3, 4];

  const press = (n) => {
    const next = [...code, n];
    setCode(next);
    if (next.length === 4) {
      if (JSON.stringify(next) === JSON.stringify(CORRECT)) {
        setTimeout(onUnlock, 300);
      } else {
        setTimeout(() => setCode([]), 600);
      }
    }
  };

  return (
    <div style={{ background: "#fff", minHeight: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32 }}>
      <h3 style={{ fontWeight: 800, fontSize: 20, marginBottom: 32 }}>Entrez votre code</h3>
      <div style={{ display: "flex", gap: 16, marginBottom: 48 }}>
        {[0, 1, 2, 3].map(i => (
          <div key={i} style={{
            width: 16, height: 16, borderRadius: "50%",
            background: i < code.length ? COLORS.primary : COLORS.border,
            transition: "background .2s",
          }} />
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16, width: "100%", maxWidth: 280 }}>
        {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k, i) => (
          <button key={i} onClick={() => {
            if (k === "⌫") setCode(c => c.slice(0, -1));
            else if (k !== "") press(k);
          }} style={{
            padding: "20px", borderRadius: 16, border: "none",
            background: k === "" ? "transparent" : COLORS.bg,
            fontSize: 20, fontWeight: 700, cursor: k === "" ? "default" : "pointer",
            color: k === "⌫" ? COLORS.red : COLORS.text,
          }}>{k}</button>
        ))}
      </div>
    </div>
  );
}

  };

  const renderScreen = () => {
    if (screen === "splash") return <SplashScreen onDone={() => setScreen("lock")} />;
    if (screen === "lock") return <LockScreen onUnlock={() => setScreen("login")} />;
    if (screen === "login") return <LoginScreen onLogin={() => setScreen("app")} />;

    // Main App
    const content = () => {
      switch (activeTab) {
        case "home": return <HomeScreen onNav={handleNav} />;
        case "transactions": return <TransactionsScreen transactions={transactions} onNav={handleNav} />;
        case "budgets": return <BudgetsScreen />;
        case "objectifs": return <ObjectifsScreen />;
        case "tontines": return <TontinesScreen />;
        case "analyse": return <AnalyseScreen />;
        case "profil": return <ProfilScreen onLogout={() => setScreen("login")} />;
        case "parametres": return <ParamètresScreen />;
        default: return <HomeScreen onNav={handleNav} />;
      }
    };

    return (
      <>
        <div style={{ overflowY: "auto", height: "100%", position: "relative" }}>
          {content()}
        </div>
        <BottomNav
          active={activeTab}
          onNav={handleNav}
          onAdd={handleAdd}
        />
        {showAdd && (
          <AddTransactionScreen
            onClose={() => setShowAdd(false)}
            onSave={handleSaveTx}
          />
        )}
        {showSuccess && (
          <SuccessToast onClose={() => setShowSuccess(false)} />
        )}
      </>
    );
  };

  return (
    <div style={{
      fontFamily: "'Poppins', system-ui, sans-serif",
      background: COLORS.bg,
      height: "100vh",
      display: "flex",
      flexDirection: "column",
      position: "relative",
      overflow: "hidden",
    }}>
      {/* Status bar */}
      {screen === "app" && (
        <div style={{
          background: "#fff", height: 0, flexShrink: 0,
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "0 20px", fontSize: 12, fontWeight: 600,
        }}>
          <span>9:41</span>
          <span>📶 🔋</span>
        </div>
      )}

      <div style={{ flex: 1, overflowY: "auto", overflowX: "hidden" }}>
        {renderScreen()}
      </div>

      {/* Quick nav shortcut buttons (demo) */}
      {screen === "app" && activeTab === "home" && (
        <div style={{
          position: "fixed", bottom: 90, right: 12, display: "flex", flexDirection: "column", gap: 8, zIndex: 50,
        }}>
          {[
            { label: "💰 Tontines", tab: "tontines" },
            { label: "📊 Analyse", tab: "analyse" },
            { label: "🎯 Objectifs", tab: "objectifs" },
            { label: "📋 Budgets", tab: "budgets" },
            { label: "⚙️ Paramètres", tab: "parametres" },
          ].map(b => (
            <button key={b.tab} onClick={() => handleNav(b.tab)} style={{
              padding: "7px 12px", borderRadius: 20, border: "none",
              background: COLORS.primary + "EE", color: "#fff", fontSize: 11, fontWeight: 700,
              cursor: "pointer", backdropFilter: "blur(8px)",
              boxShadow: "0 2px 10px rgba(43,78,255,.3)",
            }}>{b.label}</button>
          ))}
        </div>
      )}
    </div>
  );
}


// ═══ Montage React ═══
const root = ReactDOM.createRoot(document.getElementById('app-shell'));
root.render(<App />);
</script>
</body>
</html>
